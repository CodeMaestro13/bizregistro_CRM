<mat-card class="tagus-card mb-25 pt-25">
    <mat-card-header style="justify-content: center;">
        <h2 class="centerText" style="font-size: 20px; font-weight: 500;display: flex; justify-content: center; align-items: center;">
            <i class="ri-pie-chart-line"></i> &nbsp; Client Work Activity Log
        </h2>
    </mat-card-header>
    <mat-card-content>
        <ng-container *ngIf="graphData?.filler_work_today?.length > 0;else noData">
            <div class="chart">
                <apx-chart
                    [series]="chartOptions.series!"
                    [legend]="chartOptions.legend!"
                    [chart]="chartOptions.chart!"
                    [labels]="chartOptions.labels!"
                    [grid]="chartOptions.grid!"
                    [fill]="chartOptions.fill!"
                    [stroke]="chartOptions.stroke!"
                    [responsive]="chartOptions.responsive!"
                ></apx-chart>
            </div>
        </ng-container>
        <ng-template #noData>
            <div class="no-data">
                <i class="ri-emotion-sad-line" style="font-size: 48px; color: gray;"></i>
                <p style="font-size: 16px; color: gray;">No data available to display.</p>
            </div>
        </ng-template>
    </mat-card-content>
</mat-card>
