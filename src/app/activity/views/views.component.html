<ng-container *ngIf="visible">
    <div class="dt-modal-overlay">
        <div class="dt-modal-box" style="height: fit-content;">

            <div class="dt-modal-header">
                <h3 class="dt-modal-title">#{{ elementData?.leadName }}<small> ({{elementData?.leadMobile}})</small></h3>
                <span (click)="close()" class="dt-modal-close">&times;</span>
            </div>
            <div class="dt-modal-body">
                <div class="mat-elevation-z8">
                    <table mat-table [dataSource]="dataSource">
            
                        <!-- Position Column -->
                        <ng-container matColumnDef="SN">
                            <th mat-header-cell *matHeaderCellDef> No. </th>
                            <td mat-cell *matCellDef="let element;let i = index"> {{i + 1}} </td>
                        </ng-container>
            
                        <!-- Name Column -->
                        <ng-container matColumnDef="Lead Details">
                            <th mat-header-cell *matHeaderCellDef> BDE Name </th>
                            <td mat-cell *matCellDef="let element"> 
                                {{element.handledBy}} 
                            </td>
                        </ng-container>
            
                        <!-- Weight Column -->
                        <ng-container matColumnDef="Activity">
                            <th mat-header-cell *matHeaderCellDef> Activity </th>
                            <td mat-cell *matCellDef="let element"> 
                                {{element.statusName}}
                                <br>{{element.description}} 
                            </td>    
                        </ng-container>
            
                        <!-- Symbol Column -->
                        <ng-container matColumnDef="Created Date">
                            <th mat-header-cell *matHeaderCellDef> Created Date </th>
                            <td mat-cell *matCellDef="let element"> 
                                {{element.added_on}} 
                                <hr>
                                Next Call Date: <br *ngIf="element?.next_call_date">
                                {{element.next_call_date}}
                            </td>
                        </ng-container>
            
                        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

                    </table>
                </div>
            </div>
            <div class="dt-modal-footer">
                <button (click)="close()" mat-flat-button color="warn">Close</button>
            </div>
        </div>
    </div>
</ng-container>
